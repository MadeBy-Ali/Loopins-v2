name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: |
          npx next build

      - name: Validate build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ out/ directory missing"
            exit 1
          fi

          if [ ! -f "out/index.html" ]; then
            echo "❌ index.html missing in out/"
            exit 1
          fi

      - name: Deploy build (atomic)
        run: |
          mkdir -p /home/loopins/apps/loopins_web_new
          rm -rf /home/loopins/apps/loopins_web_new/*
          cp -r out/* /home/loopins/apps/loopins_web_new/

          rm -rf /home/loopins/apps/loopins_web_old || true
          mv /home/loopins/apps/loopins_web /home/loopins/apps/loopins_web_old || true
          mv /home/loopins/apps/loopins_web_new /home/loopins/apps/loopins_web

      - name: Fix permissions
        run: |
          chown -R loopins:www-data /home/loopins/apps/loopins_web
          find /home/loopins/apps/loopins_web -type d -exec chmod 755 {} \;
          find /home/loopins/apps/loopins_web -type f -exec chmod 644 {} \;

      - name: Reload Nginx
        run: sudo systemctl reload nginx
